<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>브랜드플로우</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root {
    --bg: #f6f7f9; --panel: #fff; --line: #e6e8ec; --ink: #1d2330;
    --sub: #6b7280; --accent: #2f6df0; --accent-soft: #eaf1ff;
    --good: #16a34a; --bad: #e0483b; --neutral: #94a3b8; --prog: #2f6df0;
    --line-soft: #eef0f3;
    --shadow-xs: 0 1px 2px rgba(20,30,50,.05);
    --shadow-sm: 0 1px 2px rgba(20,30,50,.04), 0 2px 6px rgba(20,30,50,.05);
    --shadow-md: 0 2px 4px rgba(20,30,50,.04), 0 8px 20px rgba(20,30,50,.08);
    --shadow-lg: 0 4px 8px rgba(20,30,50,.05), 0 16px 36px rgba(20,30,50,.13);
    --radius: 12px; --radius-lg: 16px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Pretendard Variable", "Pretendard", -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
         background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5;
         -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
         text-rendering: optimizeLegibility; }
  button { font-family: inherit; cursor: pointer; }

  /* 레이아웃 */
  .app { display: flex; height: 100vh; }
  .sidebar { width: 220px; background: var(--panel); border-right: 1px solid var(--line);
             display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; padding: 32px 40px 96px; }

  /* 사이드바 */
  .brand-logo { padding: 18px 18px 10px; font-weight: 800; font-size: 16px; letter-spacing: -.3px; }
  .brand-logo small { display:block; font-weight: 500; color: var(--sub); font-size: 11px; margin-top: 2px; }
  .save-state { padding: 10px 18px; font-size: 11px; color: var(--neutral); border-top: 1px solid var(--line); }
  .view-tabs { display: flex; gap: 4px; padding: 0 10px 8px; }
  .view-tabs button { flex: 1; padding: 8px 4px; border: none; background: var(--bg); border-radius: 8px;
                      font-weight: 700; font-size: 12px; color: var(--sub); cursor: pointer; }
  .view-tabs button.active { background: var(--accent-soft); color: var(--accent); }
  .side-cap { font-size: 11px; font-weight: 800; color: var(--neutral); letter-spacing: .3px; padding: 6px 12px 4px; margin-top: 14px; text-transform: uppercase; }
  .side-nav { flex: 1; overflow-y: auto; padding: 8px 6px; display: flex; flex-direction: column; }
  .side-nav > .side-cap:first-child { margin-top: 0; }
  .nav-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 9px 12px; border-radius: 10px; margin-bottom: 1px; cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--ink); transition: background .12s ease; }
  .nav-item:hover { background: var(--bg); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
  .nav-item .ni-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-item .bi-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .nav-item .cnt { font-size: 11px; font-weight: 600; color: var(--neutral); }
  .nav-item.active .cnt { color: var(--accent); }
  .nav-item .row-del { opacity: 0; font-size: 15px; line-height: 1; border: none; background: none; cursor: pointer; color: var(--neutral); padding: 0 2px; }
  .nav-item:hover .row-del { opacity: .55; }
  .nav-item .row-del:hover { opacity: 1; color: var(--bad); }
  .add-sub-nav { margin: 3px 4px 2px; padding: 8px; border: 1px dashed var(--line); background: transparent; border-radius: 9px; font-size: 12.5px; font-weight: 700; color: var(--sub); cursor: pointer; }
  .add-sub-nav:hover { border-color: var(--accent); color: var(--accent); }
  .backup-bar { display: flex; gap: 6px; padding: 8px; border-top: 1px solid var(--line); }
  .backup-bar button { flex: 1; border: 1px solid var(--line); background: var(--panel); border-radius: 8px;
                       padding: 7px; font-size: 12px; font-weight: 700; color: var(--sub); cursor: pointer; }
  .backup-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .admin-btn { width: calc(100% - 16px); margin: 0 8px 4px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 8px; font: inherit; font-size: 12px; font-weight: 700; color: var(--sub); cursor: pointer; }
  .admin-btn:hover { border-color: var(--accent); color: var(--accent); }
  .admin-btn.on { border-color: var(--good); color: var(--good); background: #16a34a0d; }
  .admin-panel { margin: 0 8px 6px; }
  .adminhelp-head { width: 100%; border: none; background: none; padding: 4px 2px; font: inherit; font-size: 11px; font-weight: 800; color: var(--sub); cursor: pointer; display: flex; align-items: center; justify-content: space-between; letter-spacing: .02em; }
  .adminhelp-head:hover { color: var(--ink); }
  .ah-chev { color: var(--neutral); font-size: 10px; }
  .adminhelp-list { display: flex; flex-direction: column; gap: 3px; padding: 4px 2px 2px; }
  .ah-item { font-size: 11.5px; color: var(--sub); font-weight: 600; padding-left: 12px; position: relative; line-height: 1.4; }
  .ah-item::before { content: '·'; position: absolute; left: 3px; color: var(--neutral); font-weight: 800; }
  .actor-bar { display: flex; align-items: center; gap: 8px; padding: 8px 8px 4px; }
  .actor-bar.saved { gap: 9px; }
  .actor-bar-label { font-size: 11px; font-weight: 800; color: var(--neutral); white-space: nowrap; }
  .actor-bar-input { flex: 1; min-width: 0; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 6px 9px; font: inherit; font-size: 12px; color: var(--ink); }
  .actor-bar-input:focus { outline: none; border-color: var(--accent); }
  .actor-save-btn { flex-shrink: 0; border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 8px; padding: 6px 11px; font: inherit; font-size: 12px; font-weight: 800; cursor: pointer; }
  .actor-save-btn:hover { filter: brightness(1.05); }
  .user-av { width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 800; }
  .actor-chip-name { flex: 1; min-width: 0; font-size: 13px; font-weight: 800; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .actor-edit-btn { flex-shrink: 0; border: 1px solid var(--line); background: var(--panel); color: var(--sub); border-radius: 8px; padding: 5px 10px; font: inherit; font-size: 11.5px; font-weight: 700; cursor: pointer; }
  .actor-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .audit-btn { width: calc(100% - 16px); margin: 0 8px 4px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 8px; font: inherit; font-size: 12px; font-weight: 800; color: var(--sub); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .audit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .audit-btn.has-new { border-color: var(--bad); color: var(--ink); }
  .ah-badge { min-width: 17px; height: 17px; padding: 0 4px; box-sizing: border-box; background: var(--bad); color: #fff; border-radius: 9px; font-size: 10px; font-weight: 800; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .audit-actor { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .aa-label { font-size: 12px; font-weight: 800; color: var(--sub); }
  .aa-current { font-size: 14px; font-weight: 800; color: var(--ink); }
  .aa-hint { font-size: 11.5px; color: var(--neutral); }
  .audit-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--line); font-size: 13px; flex-wrap: wrap; }
  .audit-row:last-child { border-bottom: none; }
  .au-actor { font-weight: 800; color: var(--ink); min-width: 64px; }
  .au-act { font-size: 11px; font-weight: 700; color: var(--prog); background: #2f6df00d; border: 1px solid #2f6df033; border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
  .au-act.perm { color: var(--bad); background: #ef44440d; border-color: #ef444433; }
  .au-act.info { color: var(--good); background: #16a34a0d; border-color: #16a34a33; }
  .au-kind { font-size: 11px; font-weight: 700; color: var(--sub); background: var(--bg); border-radius: 6px; padding: 2px 7px; }
  .au-label { flex: 1; min-width: 80px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; }
  .au-date { font-size: 11.5px; color: var(--neutral); font-variant-numeric: tabular-nums; }

  /* 공지사항 */
  /* 회의록(파란 톤) — 공지(노란 톤)와 구분 */
  .board-meeting { background: #f4f8ff; border-color: #cfe0f5; border-left-color: var(--accent); }
  .np-date { font-size: 11px; color: var(--neutral); white-space: nowrap; font-weight: 700; }
  /* 공지 목록 페이지 */
  .notice-full { display: grid; gap: 8px; margin-top: 18px; }
  .notice-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px;
                background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); cursor: pointer; transition: border-color .18s ease, box-shadow .18s ease; }
  .notice-row:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
  .nr-title { font-weight: 700; font-size: 15px; }
  .nr-snippet { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .nr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .nr-right .row-del { opacity: .4; }
  .notice-row:hover .row-del { opacity: .7; }
  /* 공지 상세 페이지 */
  .notice-meta { font-size: 13px; color: var(--neutral); font-weight: 700; margin-left: auto; }
  .notice-detail { margin-top: 16px; display: grid; gap: 12px; }
  .notice-title-input { font-size: 22px; font-weight: 800; border: none; outline: none; border-bottom: 2px solid var(--line);
                        padding: 6px 2px; background: transparent; color: var(--ink); }
  .notice-title-input:focus { border-bottom-color: var(--accent); }
  .notice-body-input { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; font: inherit; line-height: 1.7;
                       resize: none; overflow: hidden; min-height: 200px; background: var(--panel); color: var(--ink); }
  .notice-body-input:focus { outline: none; border-color: var(--accent); }

  /* 대시보드 */
  .dash-title { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -.5px; }
  .trash-scope { font-size: 13px; font-weight: 700; color: var(--accent); background: var(--accent-soft); border-radius: 8px; padding: 3px 10px; vertical-align: middle; margin-left: 4px; }
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
  .dash-card { background: var(--panel); border: 1px solid var(--line); border-left: 4px solid var(--accent); border-radius: var(--radius-lg);
               padding: 18px 20px; cursor: pointer; box-shadow: var(--shadow-sm); transition: box-shadow .2s ease, transform .2s ease; }
  .dash-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .dash-card-name { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
  .dash-card-goal { font-size: 12px; color: var(--sub); margin: 6px 0 12px; line-height: 1.5; max-height: 54px; overflow: hidden; }
  .dash-kpis { display: grid; gap: 9px; margin-bottom: 12px; }
  .dash-kpi-top { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 3px; }
  .dash-empty { font-size: 12px; color: var(--neutral); }
  .dash-stats { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; font-weight: 700; color: var(--sub); align-items: center; }
  .dash-stats .total { color: var(--ink); }
  .dash-stats .q-chip { background: var(--bg); padding: 3px 8px; border-radius: 20px; color: var(--neutral); }

  /* 대시보드 2단 패널 (자주가는 사이트 / AI 모음) */
  .dash-section-cap { font-size: 12px; font-weight: 800; color: var(--neutral); letter-spacing: .4px; text-transform: uppercase; margin: 26px 2px 12px; }
  .dash-grid + .dash-section-cap, .b-head + .dash-section-cap { margin-top: 22px; }
  .panel-empty { font-size: 12px; color: var(--neutral); padding: 8px 2px; }
  .link-row { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 9px; margin-bottom: 14px; }
  .link-row:hover { background: var(--bg); }
  .link-main { flex: 1; min-width: 0; }
  .link-name { flex: 1; min-width: 0; font-weight: 600; font-size: 13px; color: var(--ink); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .link-name:hover { color: var(--accent); }
  .link-name .ext { font-size: 11px; color: var(--neutral); }
  .link-note { font-size: 11px; color: var(--sub); margin-top: 2px; line-height: 1.4; }
  .link-actions { display: flex; gap: 2px; opacity: 0; flex-shrink: 0; }
  .link-row:hover .link-actions { opacity: 1; }
  .link-edit { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 6px; align-items: center; padding: 4px 2px; }
  .link-edit.ai { grid-template-columns: 1fr 1fr 1fr auto auto; }
  .link-edit input { border: 1px solid var(--line); border-radius: 7px; padding: 6px 9px; font: inherit; font-size: 13px; background: var(--panel); color: var(--ink); min-width: 0; }
  .link-edit input:focus { outline: none; border-color: var(--accent); }
  .page-desc { font-size: 13px; color: var(--sub); margin: 10px 2px 20px; }
  .ops-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 10px 14px; box-shadow: var(--shadow-xs); display: grid; gap: 2px; }
  .goal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .goal-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow-xs); }
  .goal-card-label { font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
  .goal-input { width: 100%; border: none; background: transparent; resize: none; font: inherit; color: var(--ink); line-height: 1.55; min-height: 44px; outline: none; overflow: hidden; }
  .goal-input::placeholder { color: var(--neutral); }
  .cap-row { display: flex; align-items: center; justify-content: space-between; }
  .cap-link { border: none; background: none; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--accent); padding: 0; letter-spacing: 0; text-transform: none; }
  .cap-link:hover { text-decoration: underline; }
  .trash-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 6px; border-bottom: 1px solid var(--line); }
  .trash-row:last-child { border-bottom: none; }
  .tr-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .tr-kind { font-size: 11px; font-weight: 800; color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 999px; flex-shrink: 0; }
  .tr-label { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tr-date { font-size: 11px; color: var(--neutral); font-weight: 600; flex-shrink: 0; white-space: nowrap; }
  .tr-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .log-top-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
  .del-soft { color: var(--bad) !important; }
  .del-soft:hover { border-color: var(--bad) !important; background: #e0483b0d !important; }

  /* 마케팅 회의록 — 마스터/디테일 */
  .primary-btn { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
  .primary-btn:hover { filter: brightness(1.07); }
  .mtg-wrap { display: grid; grid-template-columns: 340px 1fr; gap: 18px; align-items: start; margin-top: 14px; }
  .mtg-list-pane { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow-xs); display: flex; flex-direction: column; gap: 10px; max-height: calc(100vh - 160px); }
  .mtg-filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mtg-fsel { border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; font: inherit; font-size: 12px; font-weight: 600; color: var(--sub); background: var(--panel); cursor: pointer; }
  .mtg-search { border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px; font: inherit; font-size: 13px; background: var(--bg); color: var(--ink); }
  .mtg-search:focus { outline: none; border-color: var(--accent); background: var(--panel); }
  .mtg-list { overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 2px; }
  .mtg-mon { font-size: 11px; font-weight: 800; color: var(--neutral); padding: 8px 4px 2px; }
  .mtg-item { border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; cursor: pointer; transition: border-color .12s, background .12s; }
  .mtg-item:hover { border-color: var(--accent); }
  .mtg-item.sel { border-color: var(--good); background: #16a34a0a; box-shadow: 0 0 0 1px var(--good) inset; }
  .mi-top { display: flex; align-items: center; gap: 7px; }
  .mi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .mi-title { font-size: 13px; font-weight: 700; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mi-date { font-size: 11px; color: var(--neutral); font-weight: 600; flex-shrink: 0; }
  .mi-meta { display: flex; align-items: center; gap: 8px; margin-top: 7px; padding-left: 15px; }
  .mini-av { width: 18px; height: 18px; border-radius: 50%; color: #fff; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; margin-right: -5px; border: 1.5px solid var(--panel); }
  .mi-att-n { font-size: 11px; color: var(--sub); font-weight: 600; margin-left: 8px; }
  .mi-author { font-size: 11px; color: var(--neutral); font-weight: 600; margin-left: auto; white-space: nowrap; }
  .mtg-empty { font-size: 12px; color: var(--neutral); padding: 16px 4px; text-align: center; }
  .mtg-detail-pane { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px 22px 24px; box-shadow: var(--shadow-xs); min-height: 420px; }
  .mtg-detail-empty { color: var(--neutral); font-size: 13px; text-align: center; padding: 90px 0; line-height: 1.8; }
  .mtg-detail-head { display: flex; align-items: center; margin-bottom: 16px; }
  .mtg-detail-actions { margin-left: auto; display: flex; gap: 6px; }
  .mtg-mini-btn { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 6px 11px; font-size: 12px; font-weight: 700; color: var(--sub); cursor: pointer; }
  .mtg-mini-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mtg-mini-btn.del { color: var(--bad); } .mtg-mini-btn.del:hover { border-color: var(--bad); background: #e0483b0d; }
  .mtg-mini-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .mtg-mini-btn.primary:hover { background: #2a61d6; filter: brightness(1.07); color: #fff; }
  .mdv-title-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .mdv-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .mdv-title { font-size: 21px; font-weight: 800; margin: 0; letter-spacing: -.4px; }
  .mdv-type { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .mdv-datechip { display: inline-block; font-size: 13px; font-weight: 600; color: var(--sub); background: var(--bg); border-radius: 9px; padding: 7px 12px; margin: 12px 0 18px; }
  .mdv-sec-label { font-size: 12px; font-weight: 800; color: var(--sub); margin-bottom: 8px; }
  .mdv-attendees { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .mdv-att-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg); border-radius: 20px; padding: 4px 11px 4px 4px; font-size: 12px; font-weight: 600; color: var(--ink); }
  .mdv-att-chip .mini-av { margin-right: 0; }
  .mdv-author-tag { font-size: 10px; font-weight: 700; color: var(--good); background: #16a34a14; border-radius: 6px; padding: 2px 6px; margin-left: 2px; }
  .mdv-author-by { display: inline-flex; align-items: center; gap: 7px; margin: -6px 0 16px; }
  .mdv-author-by-name { font-size: 13px; font-weight: 800; color: var(--ink); }
  .mdv-author-by-tag { font-size: 10px; font-weight: 700; color: var(--sub); background: var(--bg); border-radius: 6px; padding: 2px 7px; }
  .mdv-card { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .mdv-card-cap { font-size: 13px; font-weight: 800; margin-bottom: 8px; }
  .mdv-card-body { font-size: 14px; line-height: 1.7; color: var(--ink); word-break: break-word; }
  .mtg-edit-body { display: flex; flex-direction: column; gap: 10px; }

  .cal-today:hover { border-color: var(--accent); color: var(--accent); }

  .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--neutral); padding: 4px 0; }
  .cal-dow.sun { color: #e0483b; } .cal-dow.sat { color: #2f6df0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: min-content; align-content: start; gap: 2px; }
  .cal-cell { box-sizing: border-box; position: relative; aspect-ratio: 1 / 1; border: none; background: transparent; border-radius: 9px; font: inherit; font-size: 13px; font-weight: 600; color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .12s ease; }
  .cal-cell.empty { cursor: default; }
  .cal-cell:not(.empty):hover { background: var(--bg); }
  .cal-cell.today { color: var(--accent); font-weight: 800; }
  .cal-cell.today::after { content: ''; position: absolute; inset: 4px; border: 1.5px solid var(--accent); border-radius: 9px; pointer-events: none; opacity: .5; }
  .cal-cell.has::before { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .cal-cell.sel { background: var(--accent); color: #fff; font-weight: 800; }
  .cal-cell.sel::after { display: none; }
  .cal-cell.sel.has::before { background: #fff; }

  /* 고정업무 */
  .fixed-block { background: var(--accent-soft); border-radius: 10px; padding: 10px 12px; margin: 8px 0 10px; display: grid; gap: 4px; }
  .fixed-cap { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: .3px; margin-bottom: 4px; }
  .fixed-row { display: flex; align-items: center; gap: 9px; padding: 3px 0; cursor: pointer; }
  .fixed-row.edit { cursor: default; }
  .fixed-text { flex: 1; font-size: 13px; color: var(--ink); line-height: 1.45; }
  .fixed-text .muted { color: var(--neutral); }
  .fixed-input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; font: inherit; background: var(--panel); color: var(--ink); }
  .fixed-input:focus { outline: none; border-color: var(--accent); }

  /* 전체 업무일지 — 진행 현황 */
  .log-sub { font-size: 12px; font-weight: 600; color: var(--neutral); margin-top: 4px; }
  .log-top .log-readonly-note { margin: 0; }
  .ps { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .ps-done { color: var(--good); background: #16a34a14; }
  .ps-prog { color: var(--prog); background: #2f6df014; }

  /* 멤버 페이지 — 달력 + 주간 */
  .md-top { display: grid; grid-template-columns: 224px 1fr; gap: 16px; align-items: start; margin: 8px 0 18px; }
  .md-cal .cal { width: 100%; max-width: none; margin: 0; padding: 12px 13px 13px; }
  .md-cal .cal-head { margin-bottom: 8px; }
  .md-cal .cal-title { font-size: 13px; }
  .md-cal .cal-nav { width: 24px; height: 24px; font-size: 14px; }
  .md-cal .cal-today { padding: 4px 9px; font-size: 11px; }
  .md-cal .cal-dow { font-size: 10px; padding: 2px 0; }
  .md-cal .cal-grid { grid-auto-rows: 28px; }
  .md-cal .cal-cell { aspect-ratio: auto; height: 28px; min-height: 28px; font-size: 12px; border-radius: 6px; }
  .md-cal .cal-cell.today::after { inset: 2px; }
  .md-cal .cal-cell.has::before { bottom: 3px; }
  .md-week { min-width: 0; }
  .md-week-cap { font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
  .wk-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .wk-day { text-align: left; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px 9px; min-height: 210px; cursor: pointer; display: flex; flex-direction: column; align-items: stretch; gap: 6px; transition: border-color .12s ease, box-shadow .12s ease; }
  .wk-day:hover { border-color: var(--accent); }
  .wk-day.sel { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .wk-day.today { background: var(--accent-soft); }
  .wk-dayhead { display: flex; align-items: baseline; gap: 6px; }
  .wk-dow { font-size: 11px; font-weight: 800; color: var(--neutral); }
  .wk-date { font-size: 17px; font-weight: 800; color: var(--ink); line-height: 1; }
  .wk-day.today .wk-date { color: var(--accent); }
  .wk-snips { display: grid; grid-template-columns: 1fr; gap: 4px; width: 100%; box-sizing: border-box; }
  .wk-snip { width: 100%; box-sizing: border-box; font-size: 12px; font-weight: 600; color: var(--ink); background: var(--bg); border-radius: 6px; padding: 5px 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid var(--accent); cursor: grab; transition: background .12s, transform .08s; }
  .wk-snip:hover { background: var(--accent-soft); transform: translateX(2px); }
  .wk-snip:active { cursor: grabbing; }
  .wk-snip.dragging { opacity: .4; }
  .wk-day.drag-over { border-color: var(--accent); border-style: dashed; background: var(--accent-soft); box-shadow: 0 0 0 2px var(--accent-soft); }
  .wk-snip.done { color: var(--sub); text-decoration: line-through; border-left-color: var(--good); }
  .wk-more { font-size: 11px; font-weight: 700; color: var(--neutral); padding: 1px 4px; }
  @keyframes entryFlash { 0% { background: var(--accent-soft); box-shadow: 0 0 0 2px var(--accent); } 100% { background: transparent; box-shadow: none; } }
  .log-entry.flash { animation: entryFlash 1.3s ease; border-radius: 10px; }

  /* 멤버 페이지 — 선택일 상세 */
  .md-day { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-xs); }
  .md-day-head { font-size: 16px; font-weight: 800; letter-spacing: -.3px; margin-bottom: 12px; }
  .fixed-block.day { background: var(--accent-soft); margin: 0 0 14px; }
  .fixed-cap .fx-manage { margin-left: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); border-radius: 7px; padding: 2px 9px; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0; }
  .fixed-cap .fx-manage:hover { background: #fff; }
  .fixed-empty { font-size: 12px; color: var(--neutral); padding: 2px 0; }
  .md-entries { display: grid; gap: 2px; }
  .md-ent-cap { font-size: 11px; font-weight: 800; color: var(--sub); letter-spacing: .3px; margin: 6px 0 4px; }
  @media (max-width: 820px) { .md-top { grid-template-columns: 1fr; } .md-cal .cal { max-width: 340px; } .wk-day { min-height: 116px; } }

  /* 그외(지원) 업무 — 하단 고정 */
  .extra-task { background: var(--bg); border: 1px dashed var(--line); border-left: 4px solid var(--neutral); box-shadow: none; }
  .extra-head { display: flex; align-items: center; gap: 8px; padding: 13px 18px 6px; font-weight: 800; font-size: 14px; color: var(--sub); }
  .extra-list { padding: 4px 18px 16px; display: grid; gap: 6px; }
  .extra-row { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: start; }
  .extra-row .num { padding-top: 8px; }
  .extra-main { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .extra-row textarea { width: 100%; box-sizing: border-box; border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; font: inherit; line-height: 1.5;
                        resize: vertical; min-height: 36px; background: var(--panel); color: var(--ink); }
  .extra-row textarea:focus { outline: none; border-color: var(--accent); }
  .add-extra { justify-self: start; font-size: 13px; color: var(--sub); background: none; border: 1px dashed var(--line);
               border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  .add-extra:hover { border-color: var(--accent); color: var(--accent); }

  /* 모든 입력 textarea — 자동 높이 (내부 스크롤 없음) */
  #main textarea { overflow: hidden; }

  /* 헤더 */
  .b-head { display: flex; align-items: center; gap: 10px; }
  .export-btn { white-space: nowrap; border: 1px solid var(--line); background: var(--panel); border-radius: 9px;
                padding: 9px 13px; font-weight: 700; font-size: 13px; color: var(--sub); cursor: pointer; }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }
  .b-name { font-size: 26px; font-weight: 800; border: none; outline: none; width: 100%;
            background: transparent; letter-spacing: -.5px; padding: 2px 0; }
  .year-sel { border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; font: inherit; font-weight: 800;
              color: var(--accent); background: var(--accent-soft); cursor: pointer; }
  .year-add { border: 1px solid var(--line); background: var(--panel); border-radius: 9px; padding: 8px 11px;
              font-weight: 700; font-size: 13px; color: var(--sub); cursor: pointer; white-space: nowrap; }
  .year-add:hover { border-color: var(--accent); color: var(--accent); }
  .b-head-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .b-owner { width: 100%; border: 1px solid var(--line); background: var(--panel); border-radius: 10px;
             padding: 10px 14px; margin-top: 8px; font: inherit; font-weight: 600; color: var(--ink); }
  .b-owner:focus { outline: none; border-color: var(--accent); }
  .b-owner::placeholder { color: var(--neutral); font-weight: 400; }

  /* 브랜드 카테고리 탭 */
  .cat-tabs { display: flex; gap: 8px; margin: 14px 0 4px; border-bottom: 2px solid var(--line); }
  .cat-tab { padding: 10px 16px; border: none; background: transparent; color: var(--sub); font-weight: 800; font-size: 15px;
             border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; }
  .cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* 링크형 카테고리 (마케팅 통합 대시보드) */
  .link-cat { margin-top: 18px; }
  .link-input { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 10px 13px; font: inherit; color: var(--ink); }
  .link-input:focus { outline: none; border-color: var(--accent); }
  .open-btn { white-space: nowrap; border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 9px;
              padding: 10px 14px; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; }
  .open-btn:hover { filter: brightness(1.08); }
  .link-frame { width: 100%; height: 70vh; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
  .link-hint { font-size: 12px; color: var(--neutral); margin-top: 8px; }
  .b-goal { width: 100%; border: 1px solid var(--line); background: var(--panel); border-radius: 12px;
            padding: 14px 16px; margin-top: 8px; font: inherit; line-height: 1.6; resize: vertical; color: var(--ink); }
  .goal-label { font-size: 11px; font-weight: 700; color: var(--accent); margin-top: 18px; letter-spacing: .5px; }
  .dbl:not(.editing) { cursor: pointer; }
  .owner-goal-row { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
  .owner-goal-row .goal-label { margin-top: 18px; }
  .og-owner { flex: 0 0 200px; min-width: 0; }
  .og-goal { flex: 1 1 360px; min-width: 0; }
  @media (max-width: 720px) { .og-owner, .og-goal { flex: 1 1 100%; } }

  /* KPI 카드 */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 10px; }
  .kpi-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 15px 16px; position: relative; box-shadow: var(--shadow-xs); }
  .kpi-card .kpi-del { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--neutral); font-size: 15px; opacity: 0; }
  .kpi-card:hover .kpi-del { opacity: .6; }
  .kpi-card .kpi-del:hover { opacity: 1; color: var(--bad); }
  .kpi-name { border: none; outline: none; background: transparent; font-weight: 700; font-size: 13px; color: var(--sub); width: 90%; padding: 2px 3px; border-radius: 5px; }
  .kpi-name:focus { background: var(--bg); }
  .kpi-vals { display: flex; align-items: baseline; gap: 4px; margin: 8px 0 10px; }
  .kpi-cur { font-size: 24px; font-weight: 800; border: none; outline: none; background: transparent; width: 64px; color: var(--ink); padding: 0 2px; border-radius: 5px; font-variant-numeric: tabular-nums; letter-spacing: -.4px; }
  .kpi-cur:focus { background: var(--bg); }
  .kpi-sep { color: var(--neutral); font-weight: 700; }
  .kpi-tgt { font-size: 14px; font-weight: 700; color: var(--sub); border: none; outline: none; background: transparent; width: 46px; padding: 0 2px; border-radius: 5px; }
  .kpi-tgt:focus { background: var(--bg); }
  .kpi-unit { font-size: 13px; color: var(--neutral); border: none; outline: none; background: transparent; width: 38px; padding: 0 2px; border-radius: 5px; }
  .kpi-unit:focus { background: var(--bg); }
  .kpi-bar { height: 7px; background: var(--bg); border-radius: 20px; overflow: hidden; }
  .kpi-fill { height: 100%; border-radius: 20px; transition: width .3s; }
  .kpi-pct { font-size: 11px; font-weight: 700; margin-top: 5px; }
  .add-kpi { padding: 12px; border: 1px dashed var(--line); border-radius: 12px; background: transparent; color: var(--sub); font-weight: 600; }
  .add-kpi:hover { border-color: var(--accent); color: var(--accent); }

  /* 분기 탭 */
  .qtabs { display: flex; gap: 6px; margin: 26px 0 18px; border-bottom: 1px solid var(--line); }
  .qtab { padding: 9px 16px; border: none; background: transparent; color: var(--sub); font-weight: 700;
          border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .qtab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .qtab .badge { font-size: 11px; color: var(--neutral); margin-left: 5px; }

  /* 업무 카드 */
  .task { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg);
          margin-bottom: 22px; overflow: hidden; box-shadow: var(--shadow-sm);
          border-left: 4px solid var(--accent); }
  .task-head { display:flex; align-items:center; gap: 10px; padding: 14px 18px; background: var(--bg); border-bottom: 1px solid var(--line); }
  .task-no { background: var(--accent); color: #fff; font-weight: 800; font-size: 12px; min-width: 24px; height: 24px;
             border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .task-toggle { background:none; border:none; color: var(--neutral); font-size: 13px; width: 16px; }
  .task-title { font-weight: 800; font-size: 15px; border:none; outline:none; background:transparent;
                flex:1; padding: 3px 5px; border-radius: 6px; }
  .task-title:focus { background: #fff; }
  /* 대분류 밴드(같은 대분류 한 묶음, 왼쪽 바 하나) + 이니셔티브 소제목 */
  .band { border-left: 3px solid var(--accent); border-radius: 10px; background: #f7faff;
          padding: 6px 10px 12px; margin: 20px 0 16px; }
  .band-muted { border-left-color: var(--neutral); background: var(--bg); }
  .band-body { padding: 0 2px; }
  .initsec { margin: 10px 0 10px 14px; }
  .init-body { padding: 8px 0 0 6px; }
  .grp-head { display: flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; }
  .band-head { padding: 12px 14px; background: var(--accent-soft); border-radius: 9px; margin-bottom: 4px; }
  .band-muted .band-head { background: var(--bg); }
  .init-head { padding: 8px 6px; }
  .grp-name { flex: 1; letter-spacing: -.3px; }
  .band-head .grp-name { font-weight: 800; font-size: 20px; color: var(--accent); }
  .band-muted .band-head .grp-name { color: var(--sub); }
  .init-head .grp-name { font-weight: 800; font-size: 16px; color: var(--accent); }
  .grp-cnt { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--panel); border-radius: 10px; padding: 2px 9px; }
  .init-head .grp-cnt { background: var(--bg); }
  .band-muted .grp-cnt { color: var(--sub); }
  .grp-caret { font-size: 14px; color: var(--accent); width: 14px; }
  .init-head .grp-caret { font-size: 12px; }
  .band-muted .grp-caret { color: var(--neutral); }
  /* 그룹 안 업무는 자체 왼쪽 바 제거 → 바 한 줄만 */
  .band .task { border-left: 1px solid var(--line); margin-bottom: 8px; }
  .band .task:last-child { margin-bottom: 0; }
  .add-group { margin: 2px 0 12px; padding: 9px 15px; border: 1px dashed var(--accent); border-radius: 10px;
               background: var(--accent-soft); color: var(--accent); font: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
  .add-group:hover { filter: brightness(.97); }
  .class-editor.newgroup { border: 1px solid var(--line); border-radius: 12px; margin: 2px 0 14px; }
  .ce-opt { color: var(--neutral); font-weight: 600; }
  .ce-cancel { border: 1px solid var(--line); background: var(--panel); color: var(--sub); border-radius: 9px;
               padding: 9px 16px; font: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
  .ce-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .add-task-grp { margin-top: 8px; padding: 8px 14px; border: 1px dashed var(--line); border-radius: 9px;
                  background: var(--panel); color: var(--sub); font: inherit; font-weight: 700; font-size: 12.5px; cursor: pointer; }
  .add-task-grp:hover { border-color: var(--accent); color: var(--accent); }
  .grp-del { border: none; background: none; color: var(--neutral); font-size: 16px; line-height: 1; cursor: pointer; padding: 0 4px; }
  .grp-del:hover { color: var(--bad); }
  /* 분류 칩 + 편집창 */
  .class-chip { border: 1px dashed var(--line); background: var(--panel); border-radius: 20px; padding: 4px 11px;
                font: inherit; font-size: 12px; font-weight: 700; color: var(--neutral); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .class-chip:hover { border-color: var(--accent); color: var(--accent); }
  .class-chip.set { border-style: solid; border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .class-editor { display: flex; align-items: flex-end; gap: 10px; padding: 12px 18px; background: var(--accent-soft); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .ce-field { display: flex; flex-direction: column; gap: 4px; }
  .ce-field label { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: .3px; }
  .ce-input { border: 1px solid var(--line); background: var(--panel); border-radius: 9px; padding: 8px 11px;
              font: inherit; font-size: 13px; font-weight: 600; color: var(--ink); width: 200px; }
  .ce-input:focus { outline: none; border-color: var(--accent); }
  .ce-input::placeholder { color: var(--neutral); font-weight: 400; }
  .ce-apply { border: none; background: var(--accent); color: #fff; border-radius: 9px; padding: 9px 18px;
              font: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
  .ce-apply:hover { filter: brightness(.95); }
  .status { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; border:1px solid var(--line);
            background: var(--bg); color: var(--sub); }
  .task-del { background:none;border:none;color:var(--neutral);font-size:16px;opacity:0;transition:.15s; }
  .task:hover .task-del { opacity:.6; }
  .task-del:hover { opacity:1; color: var(--bad); }

  /* 활동 타임라인 */
  .activities { padding: 4px 18px 16px 18px; border-top: 1px solid var(--line); }
  .act { position: relative; padding: 14px 0 14px 30px; }
  .act:not(:last-child)::before { content:''; position:absolute; left: 9px; top: 32px; bottom: -14px; width: 2px; background: var(--line); }
  .act-dot { position:absolute; left:0; top: 16px; width: 20px; height: 20px; border-radius: 50%;
             display:flex; align-items:center; justify-content:center; font-size: 11px; font-weight: 800; color:#fff; }
  .act-row { display:flex; align-items:center; gap: 8px; margin-bottom: 10px; }
  .round-label { font-weight: 800; font-size: 13px; }
  .act-mode { display:inline-flex; gap: 3px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 2px; }
  .mode-pill { border: none; background: none; font-size: 11px; font-weight: 700; color: var(--sub); padding: 3px 9px; border-radius: 6px; cursor: pointer; }
  .mode-pill:hover { color: var(--ink); }
  .mode-pill.on { background: var(--panel); color: var(--accent); box-shadow: var(--shadow-xs); }
  .fields { display: grid; gap: 8px; }
  .field { display:grid; grid-template-columns: 92px 1fr; gap: 10px; align-items:start; }
  .field label { font-size: 12px; font-weight: 700; color: var(--sub); padding-top: 8px; }
  .field textarea { border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; font: inherit;
                    line-height: 1.55; resize: vertical; min-height: 38px; background: var(--panel); color: var(--ink); }
  .field textarea:focus { outline: none; border-color: var(--accent); }
  .act-del { background:none; border:none; color:var(--neutral); font-size:12px; margin-left:auto; }
  .act-del:hover { color: var(--bad); }
  .add-round { margin: 6px 0 8px 30px; padding: 7px 14px; border:1px dashed var(--line); border-radius: 9px;
               background:transparent; color: var(--sub); font-weight:600; }
  .add-round:hover { border-color: var(--accent); color: var(--accent); }

  /* 번호형 행동 / 가설 리스트 */
  .list { display: grid; gap: 8px; }
  .num-row { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: start; }
  .num { font-size: 12px; font-weight: 700; color: var(--sub); padding-top: 8px; white-space: nowrap; min-width: 22px; }
  .num-row textarea { border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; font: inherit;
                      line-height: 1.55; resize: vertical; min-height: 38px; background: var(--panel); color: var(--ink); }
  .num-row textarea:focus { outline: none; border-color: var(--accent); }
  .row-del { background: none; border: none; color: var(--neutral); font-size: 15px; padding-top: 5px; }
  .row-del:hover { color: var(--bad); }
  .add-sub { justify-self: start; padding: 6px 12px; border: 1px dashed var(--line); border-radius: 8px;
             background: transparent; color: var(--sub); font-weight: 600; font-size: 13px; }
  .add-sub:hover { border-color: var(--accent); color: var(--accent); }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .hyp { border-left: 2px solid var(--accent-soft); padding-left: 10px; display: grid; gap: 6px; }

  /* 행동/가설 카드 + 세부단계 + 하위지표 */
  .act-item { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: var(--bg); }
  .act-item .num-row { display: flex; align-items: center; gap: 8px; }
  .act-title { flex: 1; border: none; outline: none; background: transparent; font-weight: 700; font-size: 14px;
               padding: 4px 5px; border-radius: 6px; resize: vertical; font-family: inherit; line-height: 1.5; }
  .act-title:focus { background: #fff; }
  .steps { display: grid; gap: 5px; padding: 6px 0 0 22px; }
  .step-row { display: grid; grid-template-columns: auto 1fr auto; gap: 6px; align-items: start; }
  .step-row .bullet { color: var(--neutral); padding-top: 7px; }
  .step-row textarea { border: 1px solid var(--line); border-radius: 7px; padding: 5px 9px; font: inherit;
                       line-height: 1.5; resize: vertical; min-height: 32px; background: #fff; color: var(--ink); }
  .step-row textarea:focus { outline: none; border-color: var(--accent); }
  /* 행동/가설 컨트롤 한 줄 (삭제 · 세부 단계 · KPI 연결) */
  .ctrl-btn { font-size: 12px; color: var(--sub); background: none; border: 1px solid var(--line);
              border-radius: 7px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
  .ctrl-btn:hover { background: #fff; color: var(--accent); border-color: var(--accent); }
  .ctrl-btn.del:hover { color: var(--bad); border-color: var(--bad); }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--neutral); padding: 2px 7px; border-radius: 6px; }
  .icon-btn:hover { background: #fff; color: var(--accent); }
  .icon-btn.del:hover { color: var(--bad); }
  .icon-btn.on { background: var(--accent-soft); color: var(--accent); }
  .task-metric { margin: 0 18px 14px !important; }
  .metric-box { display: flex; align-items: center; gap: 5px; margin: 8px 0 2px 22px; padding: 6px 9px;
                background: var(--accent-soft); border-radius: 8px; font-size: 12px; flex-wrap: wrap; }
  .metric-box input { border: 1px solid transparent; background: #fff; border-radius: 6px; padding: 3px 6px; font: inherit; color: var(--ink); }
  .metric-box input:focus { outline: none; border-color: var(--accent); }
  .m-num { width: 46px; text-align: center; }
  .m-unit { width: 40px; }
  .m-arrow { color: var(--neutral); font-weight: 700; }
  .m-kpi { border: 1px solid var(--accent) !important; color: var(--accent); font-weight: 600; }
  .m-del { margin-left: auto; }
  .m-link-label { color: var(--accent); font-weight: 700; }

  /* KPI 자동 카운팅 표시 */
  .kpi-cur.auto { display: inline-block; min-width: 40px; cursor: default; }
  .kpi-link { font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
              padding: 2px 7px; border-radius: 20px; margin-left: 4px; cursor: help; }
  /* 붙여넣은 이미지 썸네일 */
  .img-strip { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 2px 22px; }
  .thumb { position: relative; width: 88px; height: 64px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; display: block; }
  .img-lightbox { position: fixed; inset: 0; background: rgba(15,20,35,.82); display: none; align-items: center; justify-content: center; z-index: 9999; cursor: zoom-out; padding: 24px; }
  .img-lightbox.show { display: flex; }
  .img-lightbox img { max-width: 94vw; max-height: 94vh; border-radius: 10px; box-shadow: 0 12px 48px rgba(0,0,0,.45); }
  .thumb-del { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border: none; border-radius: 50%;
               background: rgba(0,0,0,.55); color: #fff; font-size: 12px; line-height: 1; cursor: pointer; opacity: 0; }
  .thumb:hover .thumb-del { opacity: 1; }

  .add-task { padding: 11px 18px; border: 1px dashed var(--line); border-radius: 12px; background: var(--panel);
              color: var(--sub); font-weight: 700; width: 100%; }
  .add-task:hover { border-color: var(--accent); color: var(--accent); }
  .empty { color: var(--neutral); text-align:center; padding: 40px 0; }
</style>

<script>
const OUTCOMES = {
  progress: { label: '진행중', color: 'var(--prog)' },
  good:     { label: '좋음',   color: 'var(--good)' },
  bad:      { label: '아쉬움', color: 'var(--bad)' },
  neutral:  { label: '보통',   color: 'var(--neutral)' },
};
const STATUSES = ['예정', '진행중', '완료', '보류'];

let data = { brands: [], members: [], logs: [] };
let curBrand = null;   // index
let curQuarter = 0;    // index
let view = 'brand';    // 'brand' | 'log'
let adminUnlocked = false;  // 관리자 잠금 해제 여부(세션 한정)
let adminHelpOpen = false;  // 관리자 전용 작업 안내 패널 펼침 여부(기본 접힘)
let actorEditing = false;   // 사용자 이름 입력 편집 모드(미설정이면 자동 입력 모드)
let curMember = null;  // 로그 뷰: null=전체, id=멤버 상세
let curCat = 'growth'; // 브랜드 카테고리: 'growth' | 'marketing'
let boardView = null;  // 대시보드 게시판: null=개요, {coll, mode:'list'|id}
let expFilter = '전체';        // 고정지출 카테고리 필터
let expSort = 'amount-desc';   // 고정지출 정렬
let expPage = false;           // 고정지출 관리 페이지 펼침 여부
let opsPage = null;            // 운영 페이지: null | 'sites' | 'ai'
let curMeeting = null;         // 회의록 선택 id
let meetingEdit = false;       // 회의록 수정 모드
let mtgSearch = '';            // 회의록 검색어
let mtgType = '전체';          // 회의록 유형 필터
let mtgPeriod = '전체';        // 회의록 기간 필터
let memberTab = 'log';         // 멤버 페이지 탭: 'log' | 'projects'
let curProject = null;         // 선택된 프로젝트 id
let logTrash = false;          // 업무일지 휴지통 페이지 여부
let pjOpenMeeting = null;      // 프로젝트 안에서 인라인으로 열린 회의록 id
let pjMeetingEdit = false;     // 열린 회의록이 수정 모드인지
const MEETING_TYPES = [
  { name: '일반 회의', color: '#6366f1' },
  { name: '대표 보고', color: '#16a34a' },
  { name: '브랜드 회의', color: '#f58220' },
  { name: '외부 미팅', color: '#0ea5e9' },
  { name: '기타', color: '#94a3b8' },
];
let curYear = String(new Date().getFullYear());  // 현재 연도 (기본: 올해)
let logDate = todayStr();
let calMonth = todayStr().slice(0, 7);  // 달력에 표시 중인 월 (YYYY-MM)
let fxManage = false;  // 멤버 페이지 고정업무 관리 모드
let saveTimer = null;

const uid = (p) => p + '-' + Math.random().toString(36).slice(2, 8);

async function load() {
  const r = await fetch('/api/data');
  data = normalizeData(await r.json());
  curBrand = null; // 대시보드로 시작
  setSave('saved');
  render();
}

// 구버전 데이터를 현재 구조로 자동 변환 — 깨짐 방지
function normalizeData(d) {
  if (!d || typeof d !== 'object') d = {};
  if (!Array.isArray(d.brands)) d.brands = [];
  if (!Array.isArray(d.members)) d.members = [];
  if (!Array.isArray(d.logs)) d.logs = [];
  if (typeof d.adminPin !== 'string') d.adminPin = '';
  if (!Array.isArray(d.auditLog)) d.auditLog = [];     // 삭제 기록 [{id,ts,actor,action,kind,label}]
  if (!Array.isArray(d.notices)) d.notices = [];
  if (!Array.isArray(d.meetings)) d.meetings = [];
  if (!Array.isArray(d.fixedTasks)) d.fixedTasks = [];        // 고정업무 정의 [{id, memberId, text}]
  if (!d.fixedChecks || typeof d.fixedChecks !== 'object') d.fixedChecks = {};  // 날짜별 체크 { "fixedId__YYYY-MM-DD": true }
  if (!Array.isArray(d.sites)) d.sites = [];                  // 자주가는 사이트 [{id, name, url}]
  if (!Array.isArray(d.aiTools)) d.aiTools = [];              // 마케팅팀 AI 모음 [{id, name, url, note}]
  if (!Array.isArray(d.expenses)) d.expenses = [];           // 고정지출 [{id, name, category, amount, cycle, payDay, brandId}]
  if (!Array.isArray(d.projects)) d.projects = [];           // 개인 프로젝트 [{id, memberId, name, note, todos[]}]
  if (!d.orgGoals || typeof d.orgGoals !== 'object') d.orgGoals = {};   // 연도별 조직 목표 { "2026": {netform, team} }
  if (!Array.isArray(d.trash)) d.trash = [];                  // 휴지통 [{id, kind, label, ts, payload, ctx}]
  d.trash = d.trash.filter((t) => (Date.now() - (t && t.ts || 0)) < 30 * 24 * 60 * 60 * 1000);  // 30일 지난 항목 자동 삭제
  d.notices = d.notices.map((n) => (n.title === undefined && n.text !== undefined)
    ? { id: n.id, title: n.text, body: '', date: n.date || '', createdAt: n.createdAt }
    : { id: n.id, title: n.title || '', body: n.body || '', date: n.date || '', createdAt: n.createdAt });
  d.meetings = d.meetings.map((n) => ({
    id: n.id, title: n.title || '', type: n.type || '일반 회의', date: n.date || '', time: n.time || '',
    attendees: Array.isArray(n.attendees) ? n.attendees : [], authorId: n.authorId || '', authorName: n.authorName || '',
    agenda: n.agenda || '', body: n.body || '', projectId: n.projectId || '', createdAt: n.createdAt,
  }));
  d.projects = d.projects.map((p) => ({
    id: p.id || uid('pj'), memberId: p.memberId || '', name: p.name || '', note: p.note || '',
    done: !!p.done, createdAt: p.createdAt || '', completedAt: p.completedAt || '',
    todos: (Array.isArray(p.todos) ? p.todos : []).map((t) => ({ id: t.id || uid('td'), text: t.text || '', done: !!t.done })),
  }));
  for (const b of d.brands) {
    if (!b.links) b.links = {};
    // 연도 레이어 없는 옛 구조 → years 맵으로 이전
    if (!b.years) {
      b.years = { [String(thisYear())]: { goal: b.goal || '(목표를 입력하세요)', kpis: b.kpis || [], quarters: b.quarters || defaultQuarters() } };
      delete b.goal; delete b.kpis; delete b.quarters;
    }
    for (const yr in b.years) {
      const pl = b.years[yr];
      if (!pl.kpis) pl.kpis = [];
      if (typeof pl.goal !== 'string') pl.goal = '(목표를 입력하세요)';
      if (typeof pl.owner !== 'string') pl.owner = '';
      if (!Array.isArray(pl.quarters) || !pl.quarters.length) pl.quarters = defaultQuarters();
      for (const q of pl.quarters) {
        if (!q.extra) q.extra = [];
        q.extra = q.extra.map((v) => (v && typeof v === 'object')
          ? { text: typeof v.text === 'string' ? v.text : '', images: Array.isArray(v.images) ? v.images : [] }
          : { text: typeof v === 'string' ? v : '', images: [] });
        if (!Array.isArray(q.groups)) q.groups = [];                 // 선언된 분류(빈 그룹 포함)
        q.groups = q.groups.map((g) => ({ theme: ((g && g.theme) || '').trim(), initiative: ((g && g.initiative) || '').trim() })).filter((g) => g.theme);
        if (!Array.isArray(q.tasks)) q.tasks = [];                   // RTDB가 빈 배열을 누락시키는 것 방어
        for (const t of q.tasks) {
          if (typeof t.theme !== 'string') t.theme = '';          // 대분류
          if (typeof t.initiative !== 'string') t.initiative = ''; // 이니셔티브
          if (!Array.isArray(t.activities)) t.activities = [];
          if (t.metric != null && typeof t.metric !== 'object') t.metric = null;
          for (const ac of t.activities) {
          if (ac.mode !== 'goal' && ac.mode !== 'problem') ac.mode = (ac.round === 1 ? 'goal' : 'problem');
          if (!Array.isArray(ac.actions) && !Array.isArray(ac.hypotheses)) { /* 둘 다 없을 수 있음 */ }
          if (Array.isArray(ac.actions)) ac.actions = ac.actions.map((x) =>
            typeof x === 'string' ? { title: x, steps: [], metric: null } : { title: x.title || '', steps: Array.isArray(x.steps) ? x.steps : [], metric: x.metric || null, ord: x.ord });
          if (Array.isArray(ac.hypotheses)) ac.hypotheses = ac.hypotheses.map((x) =>
            typeof x === 'string' ? { text: x, steps: [], metric: null } : { text: x.text || '', steps: Array.isArray(x.steps) ? x.steps : [], metric: x.metric || null, ord: x.ord });
          if (!Array.isArray(ac.resultImages)) ac.resultImages = [];
          // 추가 순서(ord) 부여 — 없으면 가설 → 행동 순으로 부여(기존 표시 순서 유지)
          const allItems = [...(ac.hypotheses || []), ...(ac.actions || [])];
          if (allItems.some((x) => typeof x.ord !== 'number')) {
            let o = 0;
            (ac.hypotheses || []).forEach((x) => { x.ord = o++; });
            (ac.actions || []).forEach((x) => { x.ord = o++; });
          }
          }
        }
      }
    }
  }
  return d;
}

function cookieSet(k, v) { try { document.cookie = k + '=' + encodeURIComponent(v) + ';path=/;max-age=' + (60 * 60 * 24 * 365 * 2) + ';SameSite=Lax'; } catch (e) {} }
function cookieGet(k) { try { const m = document.cookie.match('(?:^|; )' + k.replace(/[.$?*|{}()[\]\\/+^]/g, '\\$&') + '=([^;]*)'); return m ? decodeURIComponent(m[1]) : null; } catch (e) { return null; } }

// 포커스된 필드 → 이미지를 담을 배열 반환 (없으면 null)
function imageBucket(el) {
  if (!el || !el.dataset) return null;
  const d = el.dataset;
  if (d.extra !== undefined) {
    const it = Q().extra[d.extra];
    if (it && typeof it === 'object') return (it.images = it.images || []);

  if (d.field === 'result' && d.task !== undefined && d.act !== undefined) {
    const a = Q().tasks[d.task].activities[d.act];

  if (d.target && d.idx !== undefined && d.ti !== undefined) {
    const it = itemOf(d.ti, d.ai, d.target, d.idx);
    return (it.images = it.images || []);
  }
  return null;
}
async function onPaste(e) {
  const item = [...(e.clipboardData ? e.clipboardData.items : [])].find((it) => it.type && it.type.startsWith('image/'));
  if (!item) return; // 이미지 붙여넣기가 아니면 무시 (일반 텍스트 붙여넣기 정상 동작)
  const bucket = imageBucket(document.activeElement);
  if (!bucket) return; // 이미지 지원 필드가 아니면 무시
  e.preventDefault();
  const blob = item.getAsFile();
  setSave('saving');
  try {

    scheduleSave();
    renderTasks();
  } catch (err) { setSave('error'); }
}

/* 플랜(브랜드·연도) 내 업무들의 KPI 기여 수집 */
function planMetrics(pl) {

function kpiAuto(k, pl) {

  if (!linked.length) return null;
  const sum = linked.reduce((s, m) => s + (parseFloat(m.after) || 0), 0);

function buildCalendar() {
  const [y, m] = calMonth.split('-').map(Number);
  const startDow = new Date(y, m - 1, 1).getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const withLogs = datesWithLogs();
  const today = todayStr();
  const dows = ['일', '월', '화', '수', '목', '금', '토'];
  let cells = '';
  for (let i = 0; i < startDow; i++) cells += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const cls = ['cal-cell'];
    if (ds === today) cls.push('today');

    if (withLogs.has(ds)) cls.push('has');
    cells += `<button class="${cls.join(' ')}" onclick="pickDay('${ds}')"><span>${d}</span></button>`;
  }
  return `<div class="cal">
    <div class="cal-head">
      <button class="cal-nav" onclick="calShift(-1)" title="이전 달">‹</button>

}

function weekDates(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  const base = new Date(y, m - 1, d);
  const sun = new Date(base); sun.setDate(base.getDate() - base.getDay());
  const out = [];
  for (let i = 0; i < 7; i++) { const dt = new Date(sun); dt.setDate(sun.getDate() + i); out.push(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`); }

const DOW_FULL = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
const AV_COLORS = ['#6366f1', '#16a34a', '#f58220', '#0ea5e9', '#e0483b', '#8b5cf6', '#0d9488', '#d97706'];
function avatarColor(name) { let h = 0; for (let i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0; return AV_COLORS[h % AV_COLORS.length]; }
function memberName(id) { const m = (data.members || []).find((x) => x.id === id); return m ? m.name : '?'; }
function miniAvatar(name) { return `<span class="mini-av" style="background:${avatarColor(name)}">${esc(avatarChar(name))}</span>`; }
function mtgTypeColor(t) { const f = MEETING_TYPES.find((x) => x.name === t); return f ? f.color : '#94a3b8'; }
function fmtMeetingDate(m) {
  if (!m.date) return '날짜 미정';
  const [y, mo, d] = m.date.split('-').map(Number);
  const w = DOW_FULL[new Date(y, mo - 1, d).getDay()];
  return `${y}년 ${mo}월 ${d}일 ${w}${m.time ? ' ' + m.time : ''}`;
}
function mtgShortDate(m) {
  if (!m.date) return '';
  const [y, mo, d] = m.date.split('-').map(Number);
  const w = ['일', '월', '화', '수', '목', '금', '토'][new Date(y, mo - 1, d).getDay()];
  return `${mo}. ${d}. (${w})${m.time ? ' ' + m.time : ''}`;
}
function mtgFiltered() {
  let list = (data.meetings || []).slice();
  if (mtgType !== '전체') list = list.filter((m) => m.type === mtgType);

  else if (mtgPeriod === '3m') { const c = new Date(); c.setMonth(c.getMonth() - 3); const cs = `${c.getFullYear()}-${String(c.getMonth() + 1).padStart(2, '0')}-${String(c.getDate()).padStart(2, '0')}`; list = list.filter((m) => (m.date || '') >= cs); }
  if (mtgSearch.trim()) { const q = mtgSearch.trim().toLowerCase(); list = list.filter((m) => ((m.title || '') + ' ' + (m.body || '') + ' ' + (m.agenda || '')).toLowerCase().includes(q)); }
  list.sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.id > a.id ? 1 : -1));
  return list;
}
function mtgGroupHtml(list) {

}

function parseCSV(text) {
  const rows = []; let row = [], cur = '', q = false;
  text = text.replace(/^\uFEFF/, '');
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else q = false; }
      else cur += c;
    } else if (c === '"') q = true;
    else if (c === ',') { row.push(cur); cur = ''; }
    else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
    else if (c === '\r') { /* skip */ }
    else cur += c;
  }
  if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

  for (const x of tasks) {
    const th = (x.t.theme || '').trim();
    if (!th) { unclassified.push(x); continue; }
    ensureInit(ensureTheme(th), (x.t.initiative || '').trim()).push(x);
  }
  for (const th of themeOrder) TD[th].initOrder.sort((a, b) => (a === '' ? -1 : 0) - (b === '' ? -1 : 0)); // 이니셔티브 없는 건 먼저
  let html = '';
  for (const th of themeOrder) html += renderThemeBand(th, TD[th]);
  if (unclassified.length) html += renderUnclassified(unclassified);
  return html;
}
/* 그외(지원) 업무 — 목표·활동 없이 한 일만 1·2·3 나열 */

function extraImageStrip(it, i) {

}
function addExtra() { const q = Q(); (q.extra = q.extra || []).push({ text: '', images: [] }); scheduleSave(); renderTasks(); }
function delExtra(i) { if (!confirm('이 항목을 삭제할까요?')) return; Q().extra.splice(i, 1); scheduleSave(); renderTasks(); }
function editExtra(el) { const it = Q().extra[el.dataset.extra]; if (it && typeof it === 'object') it.text = el.value; scheduleSave(); }
function delExtraImage(i, ii) { if (!confirm('이 이미지를 삭제할까요?')) return; const it = Q().extra[i]; if (it && it.images) it.images.splice(ii, 1); scheduleSave(); renderTasks(); }

function renderTask(t, ti, dispNo) {

}

// 경로 기반 단일 필드(context/result)
function single(field, label, ph, a, ti, ai) {
  return `
    <div class="field">
      <label>${label}</label>
      <textarea data-brand="${curBrand}" data-quarter="${curQuarter}" data-task="${ti}" data-act="${ai}"

// 업무 단위 KPI 기여 박스 — 입력값 + KPI 연결 드롭다운
function taskMetricBox(m, ti) {
  if (!m || m.hidden) return ''; // 숨김이어도 데이터는 유지(KPI 집계엔 계속 반영)
  const F = (f, ph, cls) => `<input class="${cls}" value="${esc(m[f] || '')}" data-ti="${ti}" data-mfield="${f}"
    oninput="editTaskMetric(this)" onchange="renderKpis()" placeholder="${ph}" />`;
  const kpis = plan().kpis || [];
  const opts = `<option value="">KPI 연결 안함</option>` +
    kpis.map((k) => `<option value="${k.id}" ${m.kpiId === k.id ? 'selected' : ''}>${esc(k.name)}</option>`).join('');
  return `<div class="metric-box task-metric">📊 KPI 기여
    ${F('before', '전', 'm-num')}<span class="m-arrow">→</span>${F('after', '후', 'm-num')}
    ${F('unit', '단위', 'm-unit')}
    <span class="m-link-label">→ KPI</span>
    <select class="m-kpi" data-ti="${ti}" onchange="linkTaskMetric(this)">${opts}</select>
    <button class="row-del m-del" onclick="removeTaskMetric(${ti})" title="KPI 기여 완전 제거">×</button>

// 행동/가설 공통 카드 (제목 또는 가설텍스트 + 세부단계 + 하위지표)
function flowItem(item, ti, ai, target, idx, dispNum) {
  const isAction = target === 'action';
  const label = isAction ? '행동' : '가설';
  const num = dispNum != null ? dispNum : idx + 1;
  const titleField = isAction
    ? `<input class="act-title" value="${esc(item.title)}" data-ti="${ti}" data-ai="${ai}" data-target="action"
             data-idx="${idx}" data-part="title" oninput="editAct(this)" placeholder="행동 제목 (예: 메인페이지 수정)" />`
    : `<textarea class="act-title" data-ti="${ti}" data-ai="${ai}" data-target="hyp" data-idx="${idx}"
                data-part="text" oninput="editAct(this)" placeholder="가설 ${num}">${esc(item.text)}</textarea>`;
  const steps = item.steps || [];
  return `
    <div class="act-item">
      <div class="num-row">
        <span class="num">${label} ${num}.</span>
        ${titleField}
        <button class="icon-btn" onclick="addStep('${target}',${ti},${ai},${idx})" title="세부 단계 추가">＋</button>
        <button class="icon-btn del" onclick="del${isAction ? 'Action' : 'Hyp'}(${ti},${ai},${idx})" title="${label} 삭제">✕</button>
      </div>
      ${steps.length ? `<div class="steps">
        ${steps.map((s, si) => `
          <div class="step-row">
            <span class="bullet">•</span>
            <textarea data-ti="${ti}" data-ai="${ai}" data-target="${target}" data-idx="${idx}"
                      data-part="step" data-sidx="${si}" oninput="editAct(this)" placeholder="세부 단계">${esc(s)}</textarea>
            <button class="row-del" onclick="delStep('${target}',${ti},${ai},${idx},${si})" title="삭제">×</button>
          </div>`).join('')}
      </div>` : ''}
      ${itemImageStrip(item, target, ti, ai, idx)}
    </div>`;
}
// 2차+: 가설/행동 리스트 (추가한 순서대로 나열, 결과는 별도 통합 칸)
function hypBlock(a, ti, ai) {
  const hyps = a.hypotheses || [];
  const acts = a.actions || [];
  const entries = [
    ...hyps.map((h, idx) => ({ item: h, target: 'hyp', idx })),
    ...acts.map((c, idx) => ({ item: c, target: 'action', idx })),
  ].sort((x, y) => (x.item.ord ?? 0) - (y.item.ord ?? 0));
  let hypNum = 0, actNum = 0;
  const body = entries.map((e) => {
    let disp;
    if (e.target === 'hyp') { hypNum++; actNum = 0; disp = hypNum; }
    else { actNum++; disp = actNum; }
    return flowItem(e.item, ti, ai, e.target, e.idx, disp);
  }).join('');
  return `
    <div class="field">
      <label>가설/행동</label>
      <div class="list">
        ${body}
        <div class="add-row">
          <button class="add-sub" onclick="addHyp(${ti},${ai})">+ 가설 추가</button>
          <button class="add-sub" onclick="addAction(${ti},${ai})">+ 행동 추가</button>
        </div>
      </div>
    </div>`;
}
function actMode(a) {
  // 'goal' = 목표형, 'problem' = 문제형. 없으면 1차는 목표형, 그 외는 문제형(기존 데이터 호환)
  if (a.mode === 'goal' || a.mode === 'problem') return a.mode;
  return a.round === 1 ? 'goal' : 'problem';
}
function setActMode(ti, ai, mode) {
  const a = Q().tasks[ti].activities[ai];
  a.mode = mode;
  scheduleSave(); renderTasks();
}
function renderAct(a, ti, ai) {
  const mode = actMode(a);
  const ctxLabel = mode === 'goal' ? '목표 / 실행 이유' : '문제/이슈';
  const ctxPlaceholder = mode === 'goal' ? '이 업무의 목표 또는 실행 이유' : '직전 차수에서 무슨 문제가 있었나';
  const resultBlock = single('result', '결과', '결과가 어땠나 (이미지는 Ctrl+V로 붙여넣기)', a, ti, ai) + resultImageStrip(a, ti, ai);
  // 차수와 무관하게: 목표형/문제형 선택 + 가설·행동 둘 다(hypBlock)
  const body = single('context', ctxLabel, ctxPlaceholder, a, ti, ai)
    + hypBlock(a, ti, ai)
    + resultBlock;
  return `
  <div class="act">
    <div class="act-dot" style="background:var(--accent)">${a.round}</div>
    <div class="act-row">
      <span class="round-label">${a.round}차 활동</span>
      <div class="act-mode">
        <button class="mode-pill ${mode === 'goal' ? 'on' : ''}" onclick="setActMode(${ti},${ai},'goal')">목표형</button>
        <button class="mode-pill ${mode === 'problem' ? 'on' : ''}" onclick="setActMode(${ti},${ai},'problem')">문제형</button>
      </div>
      <button class="act-del" onclick="delRound(${ti},${ai})">삭제</button>
    </div>
    <div class="fields">${body}</div>
  </div>`;
}

function autoGrow(el) { el.style.height = '0px'; el.style.height = el.scrollHeight + 'px'; }

/* ---------- 글쓰는 칸: 더블클릭해야 수정 ----------
   거의 안 바꾸는 칸만 더블클릭(담당자·브랜드 목표·대시보드 목표).
   분기별 활동(목표/실행이유·행동·세부단계·결과·가설 등)은 한 번 클릭으로 바로 수정. */
function isDblTarget(el) {
  if (!el || el.nodeType !== 1 || !el.classList) return false;
  return el.classList.contains('b-owner') || el.classList.contains('b-goal') || el.classList.contains('goal-input');
}
document.addEventListener('mousedown', (e) => {
  const el = e.target;
  if (isDblTarget(el) && !el.classList.contains('editing')) e.preventDefault(); // 한 번 클릭으론 포커스 차단
}, true);
document.addEventListener('dblclick', (e) => {
  const el = e.target;
  if (isDblTarget(el)) {
    if ((el.classList.contains('b-owner') || el.classList.contains('b-goal')) && !adminUnlocked) {
      alert('브랜드 목표·담당자는 관리자만 수정할 수 있습니다. 왼쪽 아래 “관리자” 버튼으로 잠금을 해제하세요.');
      return;
    }
    el.classList.add('editing'); el.focus();
  }
});
document.addEventListener('focusout', (e) => {
  const el = e.target;
  if (el && el.classList && el.classList.contains('editing')) el.classList.remove('editing'); // 포커스 잃으면 다시 잠금
});
(function () {
  const main = document.getElementById('main');
  if (!main) return;
  const mark = () => main.querySelectorAll('input, textarea').forEach((el) => { if (isDblTarget(el)) el.classList.add('dbl'); });
  new MutationObserver(mark).observe(main, { childList: true, subtree: true });
  mark();
})();

/* ---------- 브랜드 화면 → 이미지 내보내기 ---------- */
function exportImage() {
  if (typeof html2canvas === 'undefined') { alert('내보내기 모듈을 불러오지 못했습니다. (html2canvas.min.js 확인)'); return; }
  const node = document.getElementById('main');
  const btn = document.querySelector('.export-btn');
  const prev = btn ? btn.textContent : '';
  if (btn) btn.textContent = '이미지 생성 중…';
  const bg = getComputedStyle(document.body).backgroundColor || '#f6f7f9';
  html2canvas(node, { backgroundColor: bg, scale: 2, useCORS: true, windowWidth: node.scrollWidth, windowHeight: node.scrollHeight }).then((canvas) => {
    const a = document.createElement('a');
    a.download = `${(B() && B().name) || 'brand'}_${todayStr()}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    if (btn) btn.textContent = prev;
  }).catch((err) => { if (btn) btn.textContent = prev; alert('내보내기 실패: ' + err.message); });
}

/* ===== Firebase Realtime Database 연동 ===== */
let fbReady = false;       // Firebase 초기화 성공 여부
let fbRef = null;          // workspace/main 참조
let fbApplyingRemote = false; // 원격 수신 적용 중(저장 루프 방지)
let selfWritePending = 0;     // 내가 방금 보낸 저장 횟수(메아리 무시용 카운터)

function fbInit() {
  try {
    if (typeof firebase === 'undefined' || !window.FIREBASE_CONFIG) return false;
    if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
    fbRef = firebase.database().ref(window.FIREBASE_PATH || 'workspace/main');
    fbReady = true;
    return true;
  } catch (e) { fbReady = false; return false; }
}

load = async function () {
  setSave('loading');
  if (!fbInit()) {
    // Firebase 미연결(오프라인·SDK 차단 등) — SEED로 화면만 띄움
    data = normalizeData(SEED);
    curBrand = null; setSave('error'); render();
    return;
  }
  // 실시간 구독: 누군가 저장하면 모든 기기에 자동 반영
  let firstLoad = true;
  fbRef.on('value', function (snap) {
    const val = snap.val();
    if (val == null) {
      // 최초 실행 — DB가 비어있으면 SEED로 초기화하여 1회 기록
      data = normalizeData(SEED);
      selfWritePending++;
      fbRef.set(JSON.parse(JSON.stringify(data))).catch(function () {});
      curBrand = null; firstLoad = false; setSave('saved'); render();
      return;
    }
    // 내가 방금 보낸 저장이 메아리처럼 돌아온 것이면 → 무시(화면·커서 안 튐)
    if (!firstLoad && selfWritePending > 0) { selfWritePending--; setSave('saved'); return; }
    fbApplyingRemote = true;
    data = normalizeData(val);
    fbApplyingRemote = false;
    if (firstLoad) { curBrand = null; firstLoad = false; }  // curBrand 초기화는 최초 1회만
    setSave('saved'); render();
  }, function (err) {
    // 권한 거부 등 — 규칙이 잠겨있을 때
    data = normalizeData(SEED);
    setSave('error'); render();
    alert('데이터베이스에 연결되지 않았습니다. Firebase 규칙(읽기/쓰기 권한)을 확인해주세요.');
  });
};

save = async function () {
  if (fbApplyingRemote) { setSave('saved'); return; } // 원격 적용 중엔 되쓰지 않음
  if (!fbReady || !fbRef) { setSave('error'); return; }
  try {
    // undefined 제거(JSON 직렬화)하여 통째로 저장
    selfWritePending++;   // 이 저장의 메아리는 무시하도록 표시
    await fbRef.set(JSON.parse(JSON.stringify(data)));
    setSave('saved');
  } catch (e) { selfWritePending = Math.max(0, selfWritePending - 1); setSave('error'); }
};

uploadImage = async function (blob) {
  return await new Promise(function (res, rej) {
    const r = new FileReader();
    r.onload = function () { res(r.result); }; // base64 data URL을 그대로 이미지 src로 사용
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
};

load();
